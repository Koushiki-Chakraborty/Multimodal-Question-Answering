version: '3.8'

services:
  grobid:
    image: lfoppiano/grobid:0.8.0
    container_name: grobid-service
    ports:
      - "8070:8070"
    environment:
      - GROBID_HOME=/opt/grobid
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
